<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fazenda Boa Vista - Administração</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
</head>
<body>
  <div class="layout-admin">
    <nav class="sidebar">
      <div class="d-flex align-items-center gap-2 px-2 mb-2">
        <div class="selo" style="width:36px;height:36px;border-radius:10px;background:var(--verde-500);display:grid;place-items:center">🌱</div>
        <span class="navbar-brand mb-0">Boa Vista</span>
      </div>
      <div id="menu"></div>
      <hr style="border-color:#2e4b3a">
      <div class="px-2 small" id="quemSou"></div>
      <a href="#" class="item mt-1" onclick="API.sair()">Sair</a>
    </nav>
    <main class="conteudo">
      <div id="conteudo"></div>
    </main>
  </div>

  <!-- Modal de formulário -->
  <div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitulo"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalCorpo"></div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-fazenda" id="modalSalvar">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
