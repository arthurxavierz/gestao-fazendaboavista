<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fazenda Boa Vista - Entrar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
</head>
<body>
  <div class="tela-login">
    <div class="cartao-login">
      <div class="marca-fazenda">
        <div class="selo">🌱</div>
        <div>
          <h1 class="h5 mb-0">Fazenda Boa Vista</h1>
          <small class="text-muted">Sistema de gestão</small>
        </div>
      </div>
      <div id="msg"></div>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input id="email" type="email" class="form-control" autocomplete="username" placeholder="voce@fazenda.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input id="senha" type="password" class="form-control" autocomplete="current-password">
      </div>
      <button id="entrar" class="btn btn-fazenda w-100 py-2">Entrar</button>
      <div class="faixa-atividades">
        <span>☕ Café</span><span>🥑 Abacate</span><span>🐖 Suínos</span>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    const btn = document.getElementById('entrar');
    async function entrar() {
      btn.disabled = true; btn.textContent = 'Entrando...';
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.value.trim(), senha: senha.value })
        });
        const dados = await r.json();
        if (!r.ok) throw new Error(dados.erro);
        localStorage.setItem('fbv_token', dados.token);
        localStorage.setItem('fbv_usuario', JSON.stringify(dados.usuario));
        location.href = dados.usuario.perfil === 'operador' ? 'operador.html' : 'admin.html';
      } catch (e) {
        document.getElementById('msg').innerHTML =
          `<div class="alert alert-danger py-2">${e.message || 'Falha no login.'}</div>`;
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
    btn.onclick = entrar;
    senha.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
  </script>
</body>
</html>
